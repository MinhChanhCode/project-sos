spring.application.name=sos

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/sos?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:12345}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.address=0.0.0.0
server.port=8080

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.enabled=true

jwt.signerKey=xnwFOcjwF2iCwhVRVbb2fgbA1xIz1EqSe8ju7iBnNNxPrpnkPeejjH+yBXqd46Gb

app.frontend-url=${APP_FRONTEND_URL:${PUBLIC_APP_URL:http://localhost:3000}}
app.frontend-origin=${FRONTEND_ORIGIN:${app.frontend-url}}
app.qr-base-url=${QR_BASE_URL:${app.frontend-url}}
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging.level.root=INFO

logging.level.com.sqc.sos=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File logging with daily rotation
logging.file.name=logs/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.file-name-pattern=logs/application-%d{yyyy-MM-dd}.%i.log

logging.level.org.springframework.security.web.FilterChainProxy=WARN
logging.level.org.springframework.security.authentication=WARN
logging.level.org.springframework.security.authorization=WARN
